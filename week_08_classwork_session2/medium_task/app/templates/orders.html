{% extends "base.html" %}
{% block content %}

<h1>Orders</h1>

{% if orders %}
<table>
    <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Timestamp</th>
    </tr>
    {% for order in orders %}
    <tr>
        <td>{{ order[0] }}</td>
        <td>{{ order[1] }}</td>
        <td>{{ order[2] }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No orders yet.</p>
{% endif %}

{% endblock %}
